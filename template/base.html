<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hindi Sentiment Analyzer{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- STICKY FOOTER CSS -->
    <style>
    html, body {
        height: 100%;
        margin: 0;
    }
    body {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
    }
    main {
        flex: 1;
    }
    .sticky-footer {
        background: linear-gradient(135deg, #1a1a1a, #2d2d2d);
        color: #e0e0e0;
        padding: 0.8rem 0;
        margin-top: auto;
        border-top: 2px solid #4facfe;
        box-shadow: 0 -5px 20px rgba(79, 172, 254, 0.3);
        font-family: 'Poppins', sans-serif;
    }
    .footer-content {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 1rem;
    }
    .footer-left small {
        opacity: 0.8;
    }
    .footer-right h6 {
        margin: 0;
        font-size: 1rem;
        font-weight: 700;
        background: linear-gradient(45deg, #4facfe, #00f2fe);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    .footer-right .text-primary {
        color: #4facfe !important;
    }
    @media (max-width: 768px) {
        .footer-content {
            flex-direction: column;
            text-align: center;
        }
    }
    </style>
</head>
<body>
    <header>
        <nav class="container">
            <a href="/" class="logo">
                <i class="fas fa-brain"></i> IndicNLP
            </a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/analyze">Analyze</a></li>
                <li><a href="/results">Results</a></li>
                <li><a href="/about">About</a></li>
                <li><a href="/translate"><i class="fas fa-globe"></i> Translate</a></li>
            </ul>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- STICKY THIN FOOTER - BOTTOM ALWAYS -->
    <footer class="sticky-footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-left">
                    <small>&copy; 2026 IndicNLP | Made with ❤️ for India</small>
                </div>
                <div class="footer-right">
                    <h6><i class="fas fa-heart text-danger me-1"></i>CodeWithRavi</h6>
                </div>
            </div>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
